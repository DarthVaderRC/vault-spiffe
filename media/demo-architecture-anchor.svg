<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Vault as Control Plane for SPIFFE Identities</title>
  <desc id="desc">Hybrid anchor visual showing Vault as the control plane for SPIFFE identities, the HashiBank trust domain, the separate SPIRE overlay trust domain, the federation bundle bridge, and the optional performance replica experiment.</desc>
  <defs>
    <style type="text/css"><![CDATA[
      @import url("https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap");
      @media (prefers-reduced-motion: reduce) {
        svg animate, svg animateMotion, svg animateTransform { display: none; }
      }
      .eyebrow { font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: 2px; font-weight: 700; fill: #6f6f6f; }
      .title { font-family: 'IBM Plex Sans', sans-serif; font-size: 28px; font-weight: 600; fill: #161616; }
      .panel-label { font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 1.6px; font-weight: 700; fill: #525252; }
      .node-eyebrow { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 1.5px; font-weight: 700; fill: #ffffff; opacity: 0.92; }
      .node-title { font-family: 'IBM Plex Sans', sans-serif; font-size: 16px; font-weight: 600; fill: #ffffff; }
      .node-body { font-family: 'IBM Plex Sans', sans-serif; font-size: 12px; fill: #ffffff; }
      .chip-text { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.5px; font-weight: 600; fill: #525252; }
      .note-title { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 1.4px; font-weight: 700; fill: #525252; }
      .note-body { font-family: 'IBM Plex Sans', sans-serif; font-size: 12px; fill: #525252; }
      .edge-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 1px; fill: #6f6f6f; }
      .caption { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 1.6px; fill: #6f6f6f; }
    ]]></style>
    <pattern id="dg-dots" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.6" fill="#161616" opacity="0.05"/>
    </pattern>
    <filter id="dg-shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
    <marker id="dg-arrow" viewBox="0 0 7 7" refX="6" refY="3.5" markerWidth="7" markerHeight="7" orient="auto">
      <polyline points="0,0 6,3.5 0,7" fill="none" stroke="#6f6f6f" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="20" y="20" width="1160" height="720" rx="18" fill="#fdfdfd"/>
  <rect x="20" y="20" width="1160" height="720" rx="18" fill="url(#dg-dots)"/>
  <rect x="20" y="20" width="1160" height="720" rx="18" fill="none" stroke="#e0e0e0"/>

  <text x="60" y="68" class="eyebrow">DEMO ARCHITECTURE</text>
  <text x="60" y="104" class="title">Vault as Control Plane for SPIFFE Identities</text>
  <line x1="60" y1="120" x2="150" y2="120" stroke="#da1e28" stroke-width="3"/>

  <rect x="820" y="42" width="310" height="114" rx="12" fill="#f4f4f4"/>
  <text x="842" y="67" class="note-title">READING</text>
  <text x="842" y="88" class="note-body">Base trust domain: hashibank.demo</text>
  <text x="842" y="108" class="note-body">SPIRE overlay: spire.hashibank.demo</text>
  <text x="842" y="128" class="note-body">Bridge: SPIRE federation bundle</text>
  <text x="842" y="148" class="note-body">No shared root trust between the domains</text>

  <rect x="50" y="160" width="660" height="540" rx="18" fill="#f6f2ff" opacity="0.4"/>
  <rect x="50" y="160" width="660" height="540" rx="18" fill="none" stroke="#8a3ffc" stroke-width="2"/>
  <text x="74" y="192" class="panel-label">TRUST DOMAIN - hashibank.demo</text>

  <rect x="760" y="190" width="390" height="410" rx="18" fill="#fff2e8" opacity="0.55"/>
  <rect x="760" y="190" width="390" height="410" rx="18" fill="none" stroke="#ff832b" stroke-width="2" stroke-dasharray="8 6"/>
  <text x="784" y="222" class="panel-label">OPTIONAL SPIRE OVERLAY - spire.hashibank.demo</text>

  <g filter="url(#dg-shadow)">
    <rect x="238" y="240" width="320" height="146" rx="12" fill="#8a3ffc">
      <animate attributeName="opacity" values="0.9;1;0.9" dur="3.8s" repeatCount="indefinite"/>
    </rect>
  </g>
  <text x="398" y="268" text-anchor="middle" class="node-eyebrow">CORE CLUSTER</text>
  <text x="398" y="294" text-anchor="middle" class="node-title">hashibank-vault</text>
  <text x="398" y="316" text-anchor="middle" class="node-body">Vault Enterprise issues identities, verifies SVIDs,</text>
  <text x="398" y="334" text-anchor="middle" class="node-body">maps policies, and brokers secrets on one cluster.</text>

  <rect x="248" y="348" width="108" height="22" rx="11" fill="#ffffff" opacity="0.9"/>
  <rect x="364" y="348" width="50" height="22" rx="11" fill="#ffffff" opacity="0.9"/>
  <rect x="422" y="348" width="72" height="22" rx="11" fill="#ffffff" opacity="0.9"/>
  <rect x="502" y="348" width="40" height="22" rx="11" fill="#ffffff" opacity="0.9"/>
  <text x="302" y="363" text-anchor="middle" class="chip-text">auth/approle</text>
  <text x="389" y="363" text-anchor="middle" class="chip-text">pki/</text>
  <text x="458" y="363" text-anchor="middle" class="chip-text">spiffe/</text>
  <text x="522" y="363" text-anchor="middle" class="chip-text">kv/</text>

  <g filter="url(#dg-shadow)">
    <rect x="90" y="246" width="120" height="86" rx="10" fill="#ff832b">
      <animate attributeName="opacity" values="0.9;1;0.9" dur="3.8s" begin="0.3s" repeatCount="indefinite"/>
    </rect>
  </g>
  <text x="150" y="270" text-anchor="middle" class="node-eyebrow">WORKLOAD</text>
  <text x="150" y="296" text-anchor="middle" class="node-title">Payments API</text>
  <text x="150" y="316" text-anchor="middle" class="node-body">PKI cert +</text>
  <text x="150" y="332" text-anchor="middle" class="node-body">SPIFFE X.509 auth</text>

  <g filter="url(#dg-shadow)">
    <rect x="90" y="436" width="156" height="92" rx="10" fill="#1192e8">
      <animate attributeName="opacity" values="0.9;1;0.9" dur="3.8s" begin="0.6s" repeatCount="indefinite"/>
    </rect>
  </g>
  <text x="168" y="460" text-anchor="middle" class="node-eyebrow">WEB APP</text>
  <text x="168" y="486" text-anchor="middle" class="node-title">Fraud web</text>
  <text x="168" y="506" text-anchor="middle" class="node-body">JWT-SVID to Vault auth</text>
  <text x="168" y="522" text-anchor="middle" class="node-body">then leased DB access</text>

  <g filter="url(#dg-shadow)">
    <rect x="92" y="566" width="150" height="48" rx="10" fill="#24a148">
      <animate attributeName="opacity" values="0.9;1;0.9" dur="3.8s" begin="1.1s" repeatCount="indefinite"/>
    </rect>
  </g>
  <text x="167" y="586" text-anchor="middle" class="node-eyebrow">DATA STORE</text>
  <text x="167" y="607" text-anchor="middle" class="node-title">Postgres</text>

  <g filter="url(#dg-shadow)">
    <rect x="296" y="560" width="168" height="92" rx="10" fill="#1a6b7a">
      <animate attributeName="opacity" values="0.9;1;0.9" dur="3.8s" begin="0.9s" repeatCount="indefinite"/>
    </rect>
  </g>
  <text x="380" y="584" text-anchor="middle" class="node-eyebrow">DOWNSTREAM APP</text>
  <text x="380" y="610" text-anchor="middle" class="node-title">Assistant app</text>
  <text x="380" y="630" text-anchor="middle" class="node-body">Discovery + JWKS</text>
  <text x="380" y="646" text-anchor="middle" class="node-body">OIDC-style validation</text>

  <rect x="544" y="530" width="134" height="118" rx="10" fill="none" stroke="#0f62fe" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="611" y="556" text-anchor="middle" class="panel-label">OPTIONAL</text>
  <g filter="url(#dg-shadow)">
    <rect x="556" y="568" width="110" height="68" rx="10" fill="#0f62fe">
      <animate attributeName="opacity" values="0.9;1;0.9" dur="3.8s" begin="1.4s" repeatCount="indefinite"/>
    </rect>
  </g>
  <text x="611" y="592" text-anchor="middle" class="node-eyebrow">PERF REPLICA</text>
  <text x="611" y="616" text-anchor="middle" class="node-title">vault-perf</text>
  <text x="611" y="632" text-anchor="middle" class="node-body">issuer test</text>

  <g filter="url(#dg-shadow)">
    <rect x="806" y="266" width="154" height="88" rx="10" fill="#ff832b">
      <animate attributeName="opacity" values="0.9;1;0.9" dur="3.8s" begin="1.0s" repeatCount="indefinite"/>
    </rect>
  </g>
  <text x="883" y="290" text-anchor="middle" class="node-eyebrow">CONTROL PLANE</text>
  <text x="883" y="316" text-anchor="middle" class="node-title">spire-server</text>
  <text x="883" y="336" text-anchor="middle" class="node-body">publishes bundle</text>
  <text x="883" y="352" text-anchor="middle" class="node-body">Vault CA plugin</text>

  <g filter="url(#dg-shadow)">
    <rect x="986" y="246" width="130" height="74" rx="10" fill="#1192e8">
      <animate attributeName="opacity" values="0.9;1;0.9" dur="3.8s" begin="1.3s" repeatCount="indefinite"/>
    </rect>
  </g>
  <text x="1051" y="270" text-anchor="middle" class="node-eyebrow">BUNDLE BRIDGE</text>
  <text x="1051" y="294" text-anchor="middle" class="node-title">:8443</text>
  <text x="1051" y="312" text-anchor="middle" class="node-body">federation bundle</text>

  <g filter="url(#dg-shadow)">
    <rect x="806" y="446" width="146" height="86" rx="10" fill="#1192e8">
      <animate attributeName="opacity" values="0.9;1;0.9" dur="3.8s" begin="1.6s" repeatCount="indefinite"/>
    </rect>
  </g>
  <text x="879" y="470" text-anchor="middle" class="node-eyebrow">ATTESTOR</text>
  <text x="879" y="496" text-anchor="middle" class="node-title">spire-agent</text>
  <text x="879" y="516" text-anchor="middle" class="node-body">Workload API</text>
  <text x="879" y="532" text-anchor="middle" class="node-body">socket</text>

  <g filter="url(#dg-shadow)">
    <rect x="980" y="446" width="142" height="86" rx="10" fill="#24a148">
      <animate attributeName="opacity" values="0.9;1;0.9" dur="3.8s" begin="1.9s" repeatCount="indefinite"/>
    </rect>
  </g>
  <text x="1051" y="470" text-anchor="middle" class="node-eyebrow">WORKLOAD</text>
  <text x="1051" y="496" text-anchor="middle" class="node-title">Spire client</text>
  <text x="1051" y="516" text-anchor="middle" class="node-body">JWT + X.509</text>
  <text x="1051" y="532" text-anchor="middle" class="node-body">from SPIRE</text>

  <path d="M238,310 C220,308 210,300 210,289" fill="none" stroke="#6f6f6f" stroke-width="1.5" marker-end="url(#dg-arrow)"/>
  <path d="M262,386 C240,416 216,438 200,458" fill="none" stroke="#6f6f6f" stroke-width="1.5" marker-end="url(#dg-arrow)"/>
  <path d="M364,386 C360,446 370,510 378,558" fill="none" stroke="#6f6f6f" stroke-width="1.5" marker-end="url(#dg-arrow)"/>
  <path d="M520,388 C560,432 588,492 603,566" fill="none" stroke="#6f6f6f" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#dg-arrow)"/>
  <path d="M168,528 C168,540 168,548 168,566" fill="none" stroke="#6f6f6f" stroke-width="1.5" marker-end="url(#dg-arrow)"/>

  <text x="192" y="248" class="edge-label">pki/ + auth/spiffe-x509</text>
  <text x="160" y="404" class="edge-label">spiffe/ + auth/spiffe-jwt</text>
  <text x="334" y="522" class="edge-label">discovery + JWKS</text>
  <text x="542" y="460" class="edge-label">performance replication</text>
  <text x="120" y="550" class="edge-label">leased Postgres creds</text>

  <path d="M986,304 C978,304 970,304 960,304" fill="none" stroke="#6f6f6f" stroke-width="1.5" marker-end="url(#dg-arrow)"/>
  <path d="M952,490 C968,490 976,490 980,490" fill="none" stroke="#6f6f6f" stroke-width="1.5" marker-end="url(#dg-arrow)"/>
  <path d="M986,282 C952,236 808,230 558,292" fill="none" stroke="#6f6f6f" stroke-width="1.8" marker-end="url(#dg-arrow)"/>
  <path d="M806,318 C716,344 628,344 558,320" fill="none" stroke="#ff832b" stroke-width="1.8" stroke-dasharray="7 5" marker-end="url(#dg-arrow)"/>

  <text x="886" y="430" class="edge-label">Workload API socket</text>

  <circle r="4" fill="#8a3ffc" opacity="0">
    <animateMotion dur="7s" repeatCount="indefinite" path="M520,388 C560,432 588,492 603,566"/>
    <animate attributeName="fill" values="#8a3ffc;#0f62fe;#8a3ffc" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.95;0.95;0" keyTimes="0;0.08;0.92;1" dur="7s" repeatCount="indefinite"/>
  </circle>
  <circle r="4" fill="#ff832b" opacity="0">
    <animateMotion dur="6.5s" repeatCount="indefinite" path="M986,282 C952,236 808,230 558,292"/>
    <animate attributeName="fill" values="#ff832b;#1192e8;#8a3ffc" dur="6.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.95;0.95;0" keyTimes="0;0.08;0.92;1" dur="6.5s" repeatCount="indefinite"/>
  </circle>
  <circle r="4" fill="#ff832b" opacity="0">
    <animateMotion dur="6.5s" repeatCount="indefinite" begin="1.2s" path="M806,318 C716,344 628,344 558,320"/>
    <animate attributeName="fill" values="#ff832b;#8a3ffc" dur="6.5s" repeatCount="indefinite" begin="1.2s"/>
    <animate attributeName="opacity" values="0;0.95;0.95;0" keyTimes="0;0.08;0.92;1" dur="6.5s" repeatCount="indefinite" begin="1.2s"/>
  </circle>

  <rect x="230" y="710" width="740" height="18" rx="9" fill="#f4f4f4"/>
  <text x="600" y="723" text-anchor="middle" class="caption">ONE VAULT CLUSTER POWERS THE BASE DEMO; SPIRE REMAINS A SEPARATE TRUST DOMAIN FEDERATED BY THE BUNDLE ENDPOINT.</text>
</svg>
