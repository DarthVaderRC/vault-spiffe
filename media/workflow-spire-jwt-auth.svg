<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 380" role="img" aria-labelledby="title desc">
  <title id="title">SPIRE JWT-SVID to dynamic Postgres access workflow</title>
  <desc id="desc">Hybrid anchor visual for the SPIRE JWT flow: fetch a SPIRE-issued JWT-SVID, authenticate to Vault through auth/spire-jwt, retrieve dynamic database credentials, and access fraud alerts data.</desc>
  <defs>
    <style type="text/css"><![CDATA[
      @import url("https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap");
      @media (prefers-reduced-motion: reduce) {
        svg animate, svg animateMotion, svg animateTransform { display: none; }
      }
      .eyebrow { font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: 2px; font-weight: 700; fill: #6f6f6f; }
      .title { font-family: 'IBM Plex Sans', sans-serif; font-size: 28px; font-weight: 600; fill: #161616; }
      .note-title { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 1.4px; font-weight: 700; fill: #525252; }
      .note-body { font-family: 'IBM Plex Sans', sans-serif; font-size: 12px; fill: #525252; }
      .box-eyebrow { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 1.5px; font-weight: 700; fill: #ffffff; opacity: 0.92; }
      .box-title { font-family: 'IBM Plex Sans', sans-serif; font-size: 16px; font-weight: 600; fill: #ffffff; }
      .box-body { font-family: 'IBM Plex Sans', sans-serif; font-size: 12px; fill: #ffffff; }
      .box-mono { font-family: 'IBM Plex Mono', monospace; font-size: 10px; fill: #ffffff; }
      .caption { font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 1.5px; fill: #6f6f6f; }
    ]]></style>
    <pattern id="dg-dots" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.6" fill="#161616" opacity="0.05"/>
    </pattern>
    <filter id="dg-shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
    <marker id="dg-arrow" viewBox="0 0 7 7" refX="6" refY="3.5" markerWidth="7" markerHeight="7" orient="auto">
      <polyline points="0,0 6,3.5 0,7" fill="none" stroke="#6f6f6f" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="20" y="20" width="1160" height="340" rx="18" fill="#fdfdfd"/>
  <rect x="20" y="20" width="1160" height="340" rx="18" fill="url(#dg-dots)"/>
  <rect x="20" y="20" width="1160" height="340" rx="18" fill="none" stroke="#e0e0e0"/>

  <text x="56" y="60" class="eyebrow">WORKFLOW B1</text>
  <text x="56" y="96" class="title">SPIRE JWT-SVID to fraud data access</text>
  <line x1="56" y1="112" x2="146" y2="112" stroke="#da1e28" stroke-width="3"/>

  <rect x="814" y="34" width="332" height="96" rx="12" fill="#f4f4f4"/>
  <text x="838" y="58" class="note-title">READING</text>
  <text x="838" y="80" class="note-body">Trust domain: spire.hashibank.demo</text>
  <text x="838" y="98" class="note-body">Vault trusts auth/spire-jwt through the bundle</text>
  <text x="838" y="114" class="note-body">Outcome: fraud_alerts data on http://localhost:18081/</text>

  <path d="M280,214 C304,214 316,214 335,214" fill="none" stroke="#6f6f6f" stroke-width="1.5" marker-end="url(#dg-arrow)"/>
  <path d="M565,214 C589,214 601,214 620,214" fill="none" stroke="#6f6f6f" stroke-width="1.5" marker-end="url(#dg-arrow)"/>
  <path d="M850,214 C874,214 886,214 905,214" fill="none" stroke="#6f6f6f" stroke-width="1.5" marker-end="url(#dg-arrow)"/>

  <g filter="url(#dg-shadow)">
    <rect x="50" y="152" width="230" height="124" rx="8" fill="#6B3FA0">
      <animate attributeName="opacity" values="0.9;1;0.9" dur="3.6s" repeatCount="indefinite" begin="0s"/>
    </rect>
  </g>
  <text x="165" y="178" text-anchor="middle" class="box-eyebrow">STAGE 01</text>
  <text x="165" y="206" text-anchor="middle" class="box-title">SPIRE JWT fetch</text>
  <text x="165" y="228" text-anchor="middle" class="box-mono">spire-agent api fetch jwt</text>
  <text x="165" y="248" text-anchor="middle" class="box-body">aud: vault-spire-demo</text>
  <text x="165" y="264" text-anchor="middle" class="box-body">workload: vault-spire-client</text>

  <g filter="url(#dg-shadow)">
    <rect x="335" y="152" width="230" height="124" rx="8" fill="#1A6B7A">
      <animate attributeName="opacity" values="0.9;1;0.9" dur="3.6s" repeatCount="indefinite" begin="0.4s"/>
    </rect>
  </g>
  <text x="450" y="178" text-anchor="middle" class="box-eyebrow">STAGE 02</text>
  <text x="450" y="206" text-anchor="middle" class="box-title">Vault spire-jwt login</text>
  <text x="450" y="228" text-anchor="middle" class="box-mono">auth/spire-jwt/login</text>
  <text x="450" y="248" text-anchor="middle" class="box-body">SPIRE identity maps to</text>
  <text x="450" y="264" text-anchor="middle" class="box-body">a database access policy</text>

  <g filter="url(#dg-shadow)">
    <rect x="620" y="152" width="230" height="124" rx="8" fill="#B87333">
      <animate attributeName="opacity" values="0.9;1;0.9" dur="3.6s" repeatCount="indefinite" begin="0.8s"/>
    </rect>
  </g>
  <text x="735" y="178" text-anchor="middle" class="box-eyebrow">STAGE 03</text>
  <text x="735" y="206" text-anchor="middle" class="box-title">Dynamic DB creds</text>
  <text x="735" y="228" text-anchor="middle" class="box-mono">
    <tspan x="735" dy="0">database/creds/</tspan>
    <tspan x="735" dy="14">fraud-readonly</tspan>
  </text>
  <text x="735" y="258" text-anchor="middle" class="box-body">leased username + password</text>

  <g filter="url(#dg-shadow)">
    <rect x="905" y="152" width="230" height="124" rx="8" fill="#2D7A4F">
      <animate attributeName="opacity" values="0.9;1;0.9" dur="3.6s" repeatCount="indefinite" begin="1.2s"/>
    </rect>
  </g>
  <text x="1020" y="178" text-anchor="middle" class="box-eyebrow">STAGE 04</text>
  <text x="1020" y="206" text-anchor="middle" class="box-title">Fraud proof</text>
  <text x="1020" y="228" text-anchor="middle" class="box-body">
    <tspan x="1020" dy="0">query fraud_alerts and</tspan>
    <tspan x="1020" dy="16">render the dashboard</tspan>
  </text>

  <circle r="3.5" fill="#6B3FA0" opacity="0">
    <animateMotion dur="6s" repeatCount="indefinite" path="M280,214 C304,214 316,214 335,214 C589,214 601,214 620,214 C874,214 886,214 905,214"/>
    <animate attributeName="fill" values="#6B3FA0;#1A6B7A;#B87333;#2D7A4F;#6B3FA0" keyTimes="0;0.28;0.56;0.82;1" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.95;0.95;0" keyTimes="0;0.05;0.92;1" dur="6s" repeatCount="indefinite"/>
  </circle>

  <rect x="246" y="314" width="708" height="18" rx="9" fill="#f4f4f4"/>
  <text x="600" y="327" text-anchor="middle" class="caption">SPIRE ISSUES THE JWT-SVID, VAULT ACCEPTS IT THROUGH THE FEDERATION BUNDLE, AND THE RESULTING VAULT TOKEN BROKERS SHORT-LIVED DATABASE ACCESS.</text>
</svg>
