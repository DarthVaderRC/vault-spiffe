<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 360" role="img" aria-labelledby="title desc">
  <title id="title">Fraud Ops JWT workflow</title>
  <desc id="desc">Five-stage anchor visual for the fraud demo flow: AppRole login, JWT-SVID minting, SPIFFE JWT auth, dynamic database credentials, and the fraud dashboard proof.</desc>
  <defs>
    <style type="text/css"><![CDATA[
      @import url("https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap");
      @media (prefers-reduced-motion: reduce) {
        svg animate, svg animateMotion, svg animateTransform { display: none; }
      }
      .eyebrow { font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: 2px; font-weight: 700; fill: #6f6f6f; }
      .title { font-family: 'IBM Plex Sans', sans-serif; font-size: 28px; font-weight: 600; fill: #161616; }
      .box-eyebrow { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 1.6px; font-weight: 700; fill: #ffffff; opacity: 0.92; }
      .box-title { font-family: 'IBM Plex Sans', sans-serif; font-size: 15px; font-weight: 600; fill: #ffffff; }
      .box-body { font-family: 'IBM Plex Sans', sans-serif; font-size: 12px; fill: #ffffff; }
      .box-mono { font-family: 'IBM Plex Mono', monospace; font-size: 10px; fill: #ffffff; }
      .note-title { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 1.4px; font-weight: 700; fill: #525252; }
      .note-body { font-family: 'IBM Plex Sans', sans-serif; font-size: 12px; fill: #525252; }
      .caption { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 1.5px; fill: #6f6f6f; }
    ]]></style>
    <pattern id="dg-dots" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.6" fill="#161616" opacity="0.05"/>
    </pattern>
    <filter id="dg-shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
    <marker id="dg-arrow" viewBox="0 0 7 7" refX="6" refY="3.5" markerWidth="7" markerHeight="7" orient="auto">
      <polyline points="0,0 6,3.5 0,7" fill="none" stroke="#6f6f6f" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="16" y="16" width="1068" height="328" rx="18" fill="#fdfdfd"/>
  <rect x="16" y="16" width="1068" height="328" rx="18" fill="url(#dg-dots)"/>
  <rect x="16" y="16" width="1068" height="328" rx="18" fill="none" stroke="#e0e0e0"/>

  <text x="48" y="58" class="eyebrow">WORKFLOW 02</text>
  <text x="48" y="92" class="title">Fraud Ops - JWT-SVID to dynamic Postgres creds</text>
  <line x1="48" y1="108" x2="132" y2="108" stroke="#da1e28" stroke-width="3"/>

  <rect x="790" y="34" width="260" height="92" rx="12" fill="#f4f4f4"/>
  <text x="812" y="58" class="note-title">READING</text>
  <text x="812" y="79" class="note-body">Trust domain: hashibank.demo</text>
  <text x="812" y="98" class="note-body">Audience: hashibank-vault</text>
  <text x="812" y="117" class="note-body">Outcome: fraud_alerts + reveal on :18081</text>

  <path d="M190,194 C205,194 214,194 233,194" fill="none" stroke="#6f6f6f" stroke-width="1.5" marker-end="url(#dg-arrow)"/>
  <path d="M403,194 C418,194 427,194 446,194" fill="none" stroke="#6f6f6f" stroke-width="1.5" marker-end="url(#dg-arrow)"/>
  <path d="M616,194 C631,194 640,194 659,194" fill="none" stroke="#6f6f6f" stroke-width="1.5" marker-end="url(#dg-arrow)"/>
  <path d="M829,194 C844,194 853,194 872,194" fill="none" stroke="#6f6f6f" stroke-width="1.5" marker-end="url(#dg-arrow)"/>

  <g filter="url(#dg-shadow)">
    <rect x="20" y="146" width="170" height="98" rx="10" fill="#8a3ffc">
      <animate attributeName="opacity" values="0.9;1;0.9" dur="3.8s" repeatCount="indefinite" begin="0s"/>
    </rect>
  </g>
  <text x="105" y="170" text-anchor="middle" class="box-eyebrow">STAGE 01</text>
  <text x="105" y="196" text-anchor="middle" class="box-title">AppRole login</text>
  <text x="105" y="216" text-anchor="middle" class="box-body">fraud-ops-web role</text>
  <text x="105" y="232" text-anchor="middle" class="box-body">alias metadata + issuer token</text>

  <g filter="url(#dg-shadow)">
    <rect x="233" y="146" width="170" height="98" rx="10" fill="#ff832b">
      <animate attributeName="opacity" values="0.9;1;0.9" dur="3.8s" repeatCount="indefinite" begin="0.4s"/>
    </rect>
  </g>
  <text x="318" y="170" text-anchor="middle" class="box-eyebrow">STAGE 02</text>
  <text x="318" y="196" text-anchor="middle" class="box-title">Mint JWT-SVID</text>
  <text x="318" y="214" text-anchor="middle" class="box-mono">spiffe/role/fraud-ops-web</text>
  <text x="318" y="230" text-anchor="middle" class="box-body">aud = hashibank-vault</text>
  <text x="318" y="244" text-anchor="middle" class="box-body">subject = /fraud/ops-web</text>

  <g filter="url(#dg-shadow)">
    <rect x="446" y="146" width="170" height="98" rx="10" fill="#1192e8">
      <animate attributeName="opacity" values="0.9;1;0.9" dur="3.8s" repeatCount="indefinite" begin="0.8s"/>
    </rect>
  </g>
  <text x="531" y="170" text-anchor="middle" class="box-eyebrow">STAGE 03</text>
  <text x="531" y="196" text-anchor="middle" class="box-title">SPIFFE JWT auth</text>
  <text x="531" y="214" text-anchor="middle" class="box-mono">auth/spiffe-jwt/login</text>
  <text x="531" y="232" text-anchor="middle" class="box-body">Vault token on the same cluster</text>

  <g filter="url(#dg-shadow)">
    <rect x="659" y="146" width="170" height="98" rx="10" fill="#24a148">
      <animate attributeName="opacity" values="0.9;1;0.9" dur="3.8s" repeatCount="indefinite" begin="1.2s"/>
    </rect>
  </g>
  <text x="744" y="170" text-anchor="middle" class="box-eyebrow">STAGE 04</text>
  <text x="744" y="196" text-anchor="middle" class="box-title">Dynamic DB creds</text>
  <text x="744" y="212" text-anchor="middle" class="box-mono">database/creds/</text>
  <text x="744" y="226" text-anchor="middle" class="box-mono">fraud-readonly</text>
  <text x="744" y="242" text-anchor="middle" class="box-body">leased username + password</text>

  <g filter="url(#dg-shadow)">
    <rect x="872" y="146" width="170" height="98" rx="10" fill="#1a6b7a">
      <animate attributeName="opacity" values="0.9;1;0.9" dur="3.8s" repeatCount="indefinite" begin="1.6s"/>
    </rect>
  </g>
  <text x="957" y="170" text-anchor="middle" class="box-eyebrow">STAGE 05</text>
  <text x="957" y="196" text-anchor="middle" class="box-title">Fraud proof</text>
  <text x="957" y="214" text-anchor="middle" class="box-body">query fraud_alerts</text>
  <text x="957" y="230" text-anchor="middle" class="box-body">reveal in fraud dashboard</text>
  <text x="957" y="244" text-anchor="middle" class="box-mono">http://localhost:18081/</text>

  <circle r="4" fill="#8a3ffc" opacity="0">
    <animateMotion dur="7s" repeatCount="indefinite" path="M190,194 C205,194 214,194 233,194 C418,194 427,194 446,194 C631,194 640,194 659,194 C844,194 853,194 872,194"/>
    <animate attributeName="fill" values="#8a3ffc;#ff832b;#1192e8;#24a148;#1a6b7a;#8a3ffc" keyTimes="0;0.2;0.42;0.64;0.84;1" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.95;0.95;0" keyTimes="0;0.06;0.92;1" dur="7s" repeatCount="indefinite"/>
  </circle>

  <rect x="212" y="304" width="676" height="18" rx="9" fill="#f4f4f4"/>
  <text x="550" y="317" text-anchor="middle" class="caption">IDENTITY BECOMES A VAULT TOKEN, THEN A LEASED DATABASE LOGIN, THEN A VISIBLE FRAUD DATA OUTCOME.</text>
</svg>
