<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 990 682" role="img" aria-label="SPIRE JWT-SVID to Vault auth and dynamic DB access">
<defs><style type="text/css"><![CDATA[@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');]]></style><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#161616"/></marker><marker id="arrowblue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#0043ce"/></marker><marker id="arrowred" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#da1e28"/></marker></defs>
<rect x="0" y="0" width="990" height="682" fill="#ffffff"/>
<rect x="0" y="0" width="6" height="682" fill="#0f62fe"/>
<text x="48" y="56" font-family="IBM Plex Sans" font-size="26" font-weight="700" fill="#161616">SPIRE JWT-SVID to Vault auth and dynamic DB access</text>
<text x="48" y="86" font-family="IBM Plex Sans" font-size="15" fill="#525252">SPIRE Workload API -&gt; Vault SPIFFE JWT login -&gt; dynamic Postgres credentials</text>
<line x1="48" y1="104" x2="128" y2="104" stroke="#0f62fe" stroke-width="3"/>
<line x1="150" y1="196" x2="150" y2="626" stroke="#a8a8a8" stroke-width="1.5" stroke-dasharray="2 5"/>
<rect x="56.0" y="132" width="188" height="64" rx="4" fill="#ffffff" stroke="#0f62fe" stroke-width="1.6"/>
<rect x="56.0" y="132" width="188" height="5" rx="2" fill="#0f62fe"/>
<text x="150" y="162" text-anchor="middle" font-family="IBM Plex Sans" font-size="13" font-weight="700" fill="#161616">vault-spire-client</text>
<text x="150" y="182" text-anchor="middle" font-family="IBM Plex Mono" font-size="10.5" fill="#525252">fraud workload</text>
<line x1="380" y1="196" x2="380" y2="626" stroke="#a8a8a8" stroke-width="1.5" stroke-dasharray="2 5"/>
<rect x="286.0" y="132" width="188" height="64" rx="4" fill="#ffffff" stroke="#ff832b" stroke-width="1.6"/>
<rect x="286.0" y="132" width="188" height="5" rx="2" fill="#ff832b"/>
<text x="380" y="162" text-anchor="middle" font-family="IBM Plex Sans" font-size="14.5" font-weight="700" fill="#161616">SPIRE Agent</text>
<text x="380" y="182" text-anchor="middle" font-family="IBM Plex Mono" font-size="10.5" fill="#525252">Workload API</text>
<line x1="610" y1="196" x2="610" y2="626" stroke="#a8a8a8" stroke-width="1.5" stroke-dasharray="2 5"/>
<rect x="516.0" y="132" width="188" height="64" rx="4" fill="#ffffff" stroke="#8a3ffc" stroke-width="1.6"/>
<rect x="516.0" y="132" width="188" height="5" rx="2" fill="#8a3ffc"/>
<text x="610" y="162" text-anchor="middle" font-family="IBM Plex Sans" font-size="14.5" font-weight="700" fill="#161616">Vault</text>
<text x="610" y="182" text-anchor="middle" font-family="IBM Plex Mono" font-size="10.5" fill="#525252">hashibank.demo</text>
<line x1="840" y1="196" x2="840" y2="626" stroke="#a8a8a8" stroke-width="1.5" stroke-dasharray="2 5"/>
<rect x="746.0" y="132" width="188" height="64" rx="4" fill="#ffffff" stroke="#007d79" stroke-width="1.6"/>
<rect x="746.0" y="132" width="188" height="5" rx="2" fill="#007d79"/>
<text x="840" y="162" text-anchor="middle" font-family="IBM Plex Sans" font-size="14.5" font-weight="700" fill="#161616">Postgres</text>
<text x="840" y="182" text-anchor="middle" font-family="IBM Plex Mono" font-size="10.5" fill="#525252">fraud_alerts</text>
<rect x="375.5" y="236" width="9" height="58" rx="1.5" fill="#edf5ff" stroke="#a6c8ff" stroke-width="1"/>
<rect x="605.5" y="340" width="9" height="58" rx="1.5" fill="#edf5ff" stroke="#a6c8ff" stroke-width="1"/>
<rect x="605.5" y="444" width="9" height="58" rx="1.5" fill="#edf5ff" stroke="#a6c8ff" stroke-width="1"/>
<rect x="835.5" y="548" width="9" height="58" rx="1.5" fill="#edf5ff" stroke="#a6c8ff" stroke-width="1"/>
<line x1="154.5" y1="242" x2="375.5" y2="242" stroke="#161616" stroke-width="1.7" marker-end="url(#arrow)"/>
<text x="265.0" y="233" text-anchor="middle" font-family="IBM Plex Sans" font-size="12.5" font-weight="600" fill="#161616">fetch jwt -audience vault-spire-demo</text>
<text x="265.0" y="257" text-anchor="middle" font-family="IBM Plex Mono" font-size="10" fill="#525252">Workload API socket</text>
<g><circle cx="138.5" cy="242" r="9" fill="#0f62fe"/><text x="138.5" y="245.5" text-anchor="middle" font-family="IBM Plex Mono" font-size="10.5" font-weight="500" fill="#ffffff">1</text></g>
<line x1="375.5" y1="294" x2="154.5" y2="294" stroke="#525252" stroke-width="1.7" stroke-dasharray="6 4" marker-end="url(#arrow)"/>
<text x="265.0" y="285" text-anchor="middle" font-family="IBM Plex Sans" font-size="12.5" font-weight="400" fill="#525252">JWT-SVID</text>
<text x="265.0" y="309" text-anchor="middle" font-family="IBM Plex Mono" font-size="10" fill="#525252">sub spiffe://spire.hashibank.demo/...</text>
<g><circle cx="391.5" cy="294" r="9" fill="#0f62fe"/><text x="391.5" y="297.5" text-anchor="middle" font-family="IBM Plex Mono" font-size="10.5" font-weight="500" fill="#ffffff">2</text></g>
<line x1="154.5" y1="346" x2="605.5" y2="346" stroke="#161616" stroke-width="1.7" marker-end="url(#arrow)"/>
<text x="380.0" y="337" text-anchor="middle" font-family="IBM Plex Sans" font-size="12.5" font-weight="600" fill="#161616">POST auth/spire-jwt/login</text>
<text x="380.0" y="361" text-anchor="middle" font-family="IBM Plex Mono" font-size="10" fill="#525252">Authorization: Bearer JWT-SVID</text>
<g><circle cx="138.5" cy="346" r="9" fill="#0f62fe"/><text x="138.5" y="349.5" text-anchor="middle" font-family="IBM Plex Mono" font-size="10.5" font-weight="500" fill="#ffffff">3</text></g>
<line x1="605.5" y1="398" x2="154.5" y2="398" stroke="#525252" stroke-width="1.7" stroke-dasharray="6 4" marker-end="url(#arrow)"/>
<text x="380.0" y="389" text-anchor="middle" font-family="IBM Plex Sans" font-size="12.5" font-weight="400" fill="#525252">Vault client token</text>
<text x="380.0" y="413" text-anchor="middle" font-family="IBM Plex Mono" font-size="10" fill="#525252">fraud-readonly policy</text>
<g><circle cx="621.5" cy="398" r="9" fill="#0f62fe"/><text x="621.5" y="401.5" text-anchor="middle" font-family="IBM Plex Mono" font-size="10.5" font-weight="500" fill="#ffffff">4</text></g>
<line x1="154.5" y1="450" x2="605.5" y2="450" stroke="#161616" stroke-width="1.7" marker-end="url(#arrow)"/>
<text x="380.0" y="441" text-anchor="middle" font-family="IBM Plex Sans" font-size="12.5" font-weight="600" fill="#161616">GET database/creds/fraud-readonly</text>
<text x="380.0" y="465" text-anchor="middle" font-family="IBM Plex Mono" font-size="10" fill="#525252">vault token</text>
<g><circle cx="138.5" cy="450" r="9" fill="#0f62fe"/><text x="138.5" y="453.5" text-anchor="middle" font-family="IBM Plex Mono" font-size="10.5" font-weight="500" fill="#ffffff">5</text></g>
<line x1="605.5" y1="502" x2="154.5" y2="502" stroke="#525252" stroke-width="1.7" stroke-dasharray="6 4" marker-end="url(#arrow)"/>
<text x="380.0" y="493" text-anchor="middle" font-family="IBM Plex Sans" font-size="12.5" font-weight="400" fill="#525252">dynamic Postgres user</text>
<text x="380.0" y="517" text-anchor="middle" font-family="IBM Plex Mono" font-size="10" fill="#525252">username/password, lease TTL</text>
<g><circle cx="621.5" cy="502" r="9" fill="#0f62fe"/><text x="621.5" y="505.5" text-anchor="middle" font-family="IBM Plex Mono" font-size="10.5" font-weight="500" fill="#ffffff">6</text></g>
<line x1="154.5" y1="554" x2="835.5" y2="554" stroke="#161616" stroke-width="1.7" marker-end="url(#arrow)"/>
<text x="495.0" y="545" text-anchor="middle" font-family="IBM Plex Sans" font-size="12.5" font-weight="600" fill="#161616">SELECT ... FROM fraud_alerts</text>
<text x="495.0" y="569" text-anchor="middle" font-family="IBM Plex Mono" font-size="10" fill="#525252">login as ephemeral user</text>
<g><circle cx="138.5" cy="554" r="9" fill="#0f62fe"/><text x="138.5" y="557.5" text-anchor="middle" font-family="IBM Plex Mono" font-size="10.5" font-weight="500" fill="#ffffff">7</text></g>
<line x1="835.5" y1="606" x2="154.5" y2="606" stroke="#0043ce" stroke-width="1.7" stroke-dasharray="6 4" marker-end="url(#arrowblue)"/>
<text x="495.0" y="597" text-anchor="middle" font-family="IBM Plex Sans" font-size="12.5" font-weight="400" fill="#525252">fraud alert rows</text>
<text x="495.0" y="621" text-anchor="middle" font-family="IBM Plex Mono" font-size="10" fill="#525252">rendered to fraud dashboard</text>
<g><circle cx="851.5" cy="606" r="9" fill="#0f62fe"/><text x="851.5" y="609.5" text-anchor="middle" font-family="IBM Plex Mono" font-size="10.5" font-weight="500" fill="#ffffff">8</text></g>
<text x="48" y="660" font-family="IBM Plex Mono" font-size="11" fill="#525252">SPIRE identity becomes a Vault token, then a short-lived Postgres login, then fraud data</text>
</svg>
