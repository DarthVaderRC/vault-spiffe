<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 360" role="img" aria-labelledby="title desc">
  <title id="title">Payments API X.509 workflow</title>
  <desc id="desc">Four-stage anchor visual for the payments flow: AppRole login, Vault PKI certificate issuance with a SPIFFE URI SAN, SPIFFE X.509 auth, and a KV read.</desc>
  <defs>
    <style type="text/css"><![CDATA[
      @import url("https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap");
      @media (prefers-reduced-motion: reduce) {
        svg animate, svg animateMotion, svg animateTransform { display: none; }
      }
      .eyebrow { font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: 2px; font-weight: 700; fill: #6f6f6f; }
      .title { font-family: 'IBM Plex Sans', sans-serif; font-size: 28px; font-weight: 600; fill: #161616; }
      .box-eyebrow { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 1.6px; font-weight: 700; fill: #ffffff; opacity: 0.92; }
      .box-title { font-family: 'IBM Plex Sans', sans-serif; font-size: 16px; font-weight: 600; fill: #ffffff; }
      .box-body { font-family: 'IBM Plex Sans', sans-serif; font-size: 12px; fill: #ffffff; }
      .box-mono { font-family: 'IBM Plex Mono', monospace; font-size: 10px; fill: #ffffff; }
      .note-title { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 1.4px; font-weight: 700; fill: #525252; }
      .note-body { font-family: 'IBM Plex Sans', sans-serif; font-size: 12px; fill: #525252; }
      .chip { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 1px; fill: #6f6f6f; }
      .caption { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 1.5px; fill: #6f6f6f; }
    ]]></style>
    <pattern id="dg-dots" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.6" fill="#161616" opacity="0.05"/>
    </pattern>
    <filter id="dg-shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
    <marker id="dg-arrow" viewBox="0 0 7 7" refX="6" refY="3.5" markerWidth="7" markerHeight="7" orient="auto">
      <polyline points="0,0 6,3.5 0,7" fill="none" stroke="#6f6f6f" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="16" y="16" width="1068" height="328" rx="18" fill="#fdfdfd"/>
  <rect x="16" y="16" width="1068" height="328" rx="18" fill="url(#dg-dots)"/>
  <rect x="16" y="16" width="1068" height="328" rx="18" fill="none" stroke="#e0e0e0"/>

  <text x="48" y="58" class="eyebrow">WORKFLOW 01</text>
  <text x="48" y="92" class="title">Payments API - X.509 SPIFFE auth</text>
  <line x1="48" y1="108" x2="132" y2="108" stroke="#da1e28" stroke-width="3"/>

  <rect x="806" y="34" width="240" height="78" rx="12" fill="#f4f4f4"/>
  <text x="828" y="58" class="note-title">READING</text>
  <text x="828" y="79" class="note-body">Trust domain: hashibank.demo</text>
  <text x="828" y="98" class="note-body">Issuer: Vault PKI at pki/</text>
  <text x="828" y="117" class="note-body">Auth mount: auth/spiffe-x509/</text>

  <path d="M215,194 C255,194 265,194 300,194" fill="none" stroke="#6f6f6f" stroke-width="1.5" marker-end="url(#dg-arrow)"/>
  <path d="M480,194 C520,194 530,194 565,194" fill="none" stroke="#6f6f6f" stroke-width="1.5" marker-end="url(#dg-arrow)"/>
  <path d="M745,194 C785,194 795,194 830,194" fill="none" stroke="#6f6f6f" stroke-width="1.5" marker-end="url(#dg-arrow)"/>

  <g filter="url(#dg-shadow)">
    <rect x="35" y="146" width="180" height="98" rx="10" fill="#8a3ffc">
      <animate attributeName="opacity" values="0.9;1;0.9" dur="3.6s" repeatCount="indefinite" begin="0s"/>
    </rect>
  </g>
  <text x="125" y="170" text-anchor="middle" class="box-eyebrow">STAGE 01</text>
  <text x="125" y="196" text-anchor="middle" class="box-title">AppRole login</text>
  <text x="125" y="216" text-anchor="middle" class="box-body">payments-api role</text>
  <text x="125" y="232" text-anchor="middle" class="box-body">issuer-side Vault token</text>

  <g filter="url(#dg-shadow)">
    <rect x="300" y="146" width="180" height="98" rx="10" fill="#ff832b">
      <animate attributeName="opacity" values="0.9;1;0.9" dur="3.6s" repeatCount="indefinite" begin="0.4s"/>
    </rect>
  </g>
  <text x="390" y="170" text-anchor="middle" class="box-eyebrow">STAGE 02</text>
  <text x="390" y="196" text-anchor="middle" class="box-title">Vault PKI issue</text>
  <text x="390" y="214" text-anchor="middle" class="box-mono">pki/issue/payments-spiffe</text>
  <text x="390" y="230" text-anchor="middle" class="box-body">URI SAN = spiffe://hashibank.demo</text>
  <text x="390" y="244" text-anchor="middle" class="box-body">/payments/api</text>

  <g filter="url(#dg-shadow)">
    <rect x="565" y="146" width="180" height="98" rx="10" fill="#1192e8">
      <animate attributeName="opacity" values="0.9;1;0.9" dur="3.6s" repeatCount="indefinite" begin="0.8s"/>
    </rect>
  </g>
  <text x="655" y="170" text-anchor="middle" class="box-eyebrow">STAGE 03</text>
  <text x="655" y="196" text-anchor="middle" class="box-title">SPIFFE X.509 auth</text>
  <text x="655" y="214" text-anchor="middle" class="box-mono">auth/spiffe-x509/login</text>
  <text x="655" y="232" text-anchor="middle" class="box-body">role = payments-api</text>

  <g filter="url(#dg-shadow)">
    <rect x="830" y="146" width="180" height="98" rx="10" fill="#24a148">
      <animate attributeName="opacity" values="0.9;1;0.9" dur="3.6s" repeatCount="indefinite" begin="1.2s"/>
    </rect>
  </g>
  <text x="920" y="170" text-anchor="middle" class="box-eyebrow">STAGE 04</text>
  <text x="920" y="196" text-anchor="middle" class="box-title">KV business proof</text>
  <text x="920" y="214" text-anchor="middle" class="box-mono">kv/payments/api-secrets</text>
  <text x="920" y="232" text-anchor="middle" class="box-body">policy-scoped read</text>

  <rect x="335" y="258" width="110" height="20" rx="10" fill="#f4f4f4"/>
  <text x="390" y="272" text-anchor="middle" class="chip">X.509 source = pki/</text>
  <rect x="595" y="258" width="120" height="20" rx="10" fill="#f4f4f4"/>
  <text x="655" y="272" text-anchor="middle" class="chip">auth mount = spiffe-x509</text>

  <circle r="4" fill="#8a3ffc" opacity="0">
    <animateMotion dur="6.2s" repeatCount="indefinite" path="M215,194 C255,194 265,194 300,194 C520,194 530,194 565,194 C785,194 795,194 830,194"/>
    <animate attributeName="fill" values="#8a3ffc;#ff832b;#1192e8;#24a148;#8a3ffc" keyTimes="0;0.24;0.52;0.8;1" dur="6.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.95;0.95;0" keyTimes="0;0.06;0.92;1" dur="6.2s" repeatCount="indefinite"/>
  </circle>

  <rect x="252" y="304" width="596" height="18" rx="9" fill="#f4f4f4"/>
  <text x="550" y="317" text-anchor="middle" class="caption">VAULT PKI ISSUES THE CERTIFICATE; THE SAME CLUSTER RE-AUTHENTICATES IT THROUGH AUTH/SPIFFE-X509.</text>
</svg>
