<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Cross-network API authentication using JWT-SVID</title>
  <desc id="desc">Anchor visual for the Kubernetes JWT flow: relationship-assistant authenticates with Kubernetes auth, Vault mints a JWT-SVID with business metadata, the relying party validates it through discovery and JWKS, and the response returns masked relationship insights plus a next-best action.</desc>
  <defs>
    <style type="text/css"><![CDATA[
      @import url("https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap");
      @media (prefers-reduced-motion: reduce) {
        svg animate, svg animateMotion, svg animateTransform { display: none; }
      }
      .eyebrow { font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: 2px; font-weight: 700; fill: #6f6f6f; }
      .title { font-family: 'IBM Plex Sans', sans-serif; font-size: 28px; font-weight: 600; fill: #161616; }
      .note-title { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 1.4px; font-weight: 700; fill: #525252; }
      .note-body { font-family: 'IBM Plex Sans', sans-serif; font-size: 12px; fill: #525252; }
      .box-eyebrow { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 1.5px; font-weight: 700; fill: #ffffff; opacity: 0.92; }
      .box-title { font-family: 'IBM Plex Sans', sans-serif; font-size: 15px; font-weight: 600; fill: #ffffff; }
      .box-body { font-family: 'IBM Plex Sans', sans-serif; font-size: 12px; fill: #ffffff; }
      .box-mono { font-family: 'IBM Plex Mono', monospace; font-size: 9px; fill: #ffffff; }
      .caption { font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 1.4px; fill: #6f6f6f; }
    ]]></style>
    <pattern id="dg-dots" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.6" fill="#161616" opacity="0.05"/>
    </pattern>
    <filter id="dg-shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
    <marker id="dg-arrow" viewBox="0 0 7 7" refX="6" refY="3.5" markerWidth="7" markerHeight="7" orient="auto">
      <polyline points="0,0 6,3.5 0,7" fill="none" stroke="#6f6f6f" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="20" y="20" width="1160" height="380" rx="18" fill="#fdfdfd"/>
  <rect x="20" y="20" width="1160" height="380" rx="18" fill="url(#dg-dots)"/>
  <rect x="20" y="20" width="1160" height="380" rx="18" fill="none" stroke="#e0e0e0"/>

  <text x="56" y="60" class="eyebrow">WORKFLOW A2</text>
  <text x="56" y="96" class="title">Cross-network API authentication using JWT-SVID</text>
  <line x1="56" y1="112" x2="164" y2="112" stroke="#da1e28" stroke-width="3"/>

  <rect x="786" y="34" width="360" height="108" rx="12" fill="#f4f4f4"/>
  <text x="810" y="58" class="note-title">READING</text>
  <text x="810" y="80" class="note-body">Audience: relationship-insights-api</text>
  <text x="810" y="98" class="note-body">Issuer: https://vault.demo.internal:18200/v1/spiffe</text>
  <text x="810" y="116" class="note-body">Claims: application, line_of_business, customer_data_domain</text>
  <text x="810" y="134" class="note-body">Outcome: masked insights and a next-best action</text>

  <path d="M246,252 C258,252 266,252 276,252" fill="none" stroke="#6f6f6f" stroke-width="1.5" marker-end="url(#dg-arrow)"/>
  <path d="M474,252 C486,252 494,252 504,252" fill="none" stroke="#6f6f6f" stroke-width="1.5" marker-end="url(#dg-arrow)"/>
  <path d="M702,252 C714,252 722,252 732,252" fill="none" stroke="#6f6f6f" stroke-width="1.5" marker-end="url(#dg-arrow)"/>
  <path d="M930,252 C942,252 950,252 960,252" fill="none" stroke="#6f6f6f" stroke-width="1.5" marker-end="url(#dg-arrow)"/>

  <g filter="url(#dg-shadow)">
    <rect x="42" y="188" width="204" height="132" rx="8" fill="#8A3FFC">
      <animate attributeName="opacity" values="0.9;1;0.9" dur="3.8s" repeatCount="indefinite" begin="0s"/>
    </rect>
  </g>
  <text x="144" y="214" text-anchor="middle" class="box-eyebrow">STAGE 01</text>
  <text x="144" y="242" text-anchor="middle" class="box-title">Kubernetes auth</text>
  <text x="144" y="264" text-anchor="middle" class="box-body">
    <tspan x="144" dy="0">relationship-assistant</tspan>
    <tspan x="144" dy="16">uses its service account JWT</tspan>
  </text>

  <g filter="url(#dg-shadow)">
    <rect x="276" y="188" width="204" height="132" rx="8" fill="#FF832B">
      <animate attributeName="opacity" values="0.9;1;0.9" dur="3.8s" repeatCount="indefinite" begin="0.35s"/>
    </rect>
  </g>
  <text x="378" y="214" text-anchor="middle" class="box-eyebrow">STAGE 02</text>
  <text x="378" y="242" text-anchor="middle" class="box-title">Mint JWT-SVID</text>
  <text x="378" y="262" text-anchor="middle" class="box-mono">
    <tspan x="378" dy="0">spiffe/role/relationship-assistant-k8s</tspan>
  </text>
  <text x="378" y="288" text-anchor="middle" class="box-body">
    <tspan x="378" dy="0">adds workload identity plus</tspan>
    <tspan x="378" dy="16">business metadata claims</tspan>
  </text>

  <g filter="url(#dg-shadow)">
    <rect x="510" y="188" width="204" height="132" rx="8" fill="#0F62FE">
      <animate attributeName="opacity" values="0.9;1;0.9" dur="3.8s" repeatCount="indefinite" begin="0.7s"/>
    </rect>
  </g>
  <text x="612" y="214" text-anchor="middle" class="box-eyebrow">STAGE 03</text>
  <text x="612" y="242" text-anchor="middle" class="box-title">Discovery and JWKS</text>
  <text x="612" y="264" text-anchor="middle" class="box-body">
    <tspan x="612" dy="0">Vault publishes OIDC metadata</tspan>
    <tspan x="612" dy="16">and the signing keys</tspan>
  </text>

  <g filter="url(#dg-shadow)">
    <rect x="744" y="188" width="204" height="132" rx="8" fill="#1192E8">
      <animate attributeName="opacity" values="0.9;1;0.9" dur="3.8s" repeatCount="indefinite" begin="1.05s"/>
    </rect>
  </g>
  <text x="846" y="214" text-anchor="middle" class="box-eyebrow">STAGE 04</text>
  <text x="846" y="242" text-anchor="middle" class="box-title">Relationship insights API</text>
  <text x="846" y="264" text-anchor="middle" class="box-body">
    <tspan x="846" dy="0">checks signature, audience,</tspan>
    <tspan x="846" dy="16">subject, and business claims</tspan>
  </text>

  <g filter="url(#dg-shadow)">
    <rect x="978" y="188" width="180" height="132" rx="8" fill="#24A148">
      <animate attributeName="opacity" values="0.9;1;0.9" dur="3.8s" repeatCount="indefinite" begin="1.4s"/>
    </rect>
  </g>
  <text x="1068" y="214" text-anchor="middle" class="box-eyebrow">STAGE 05</text>
  <text x="1068" y="242" text-anchor="middle" class="box-title">Business outcome</text>
  <text x="1068" y="264" text-anchor="middle" class="box-body">
    <tspan x="1068" dy="0">masked insights plus</tspan>
    <tspan x="1068" dy="16">the next-best action</tspan>
  </text>

  <circle r="3.6" fill="#8A3FFC" opacity="0">
    <animateMotion dur="6.4s" repeatCount="indefinite" path="M246,252 C258,252 266,252 276,252 C486,252 494,252 504,252 C714,252 722,252 732,252 C942,252 950,252 960,252"/>
    <animate attributeName="fill" values="#8A3FFC;#FF832B;#0F62FE;#1192E8;#24A148;#8A3FFC" keyTimes="0;0.2;0.42;0.66;0.88;1" dur="6.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.95;0.95;0" keyTimes="0;0.06;0.92;1" dur="6.4s" repeatCount="indefinite"/>
  </circle>
  <circle r="3.2" fill="#0F62FE" opacity="0">
    <animateMotion dur="6.4s" repeatCount="indefinite" begin="2.3s" path="M612,186 C690,150 774,150 846,186"/>
    <animate attributeName="opacity" values="0;0.9;0.9;0" keyTimes="0;0.1;0.84;1" dur="6.4s" begin="2.3s" repeatCount="indefinite"/>
  </circle>

  <rect x="118" y="352" width="964" height="18" rx="9" fill="#f4f4f4"/>
  <text x="600" y="365" text-anchor="middle" class="caption">VAULT MINTS A JWT-SVID WITH BUSINESS CONTEXT, PUBLISHES DISCOVERY METADATA, AND A CROSS-NETWORK API AUTHORIZES THE WORKLOAD BEFORE RETURNING BANKER ACTIONS.</text>
</svg>
