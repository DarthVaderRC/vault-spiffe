<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1360 860" role="img" aria-labelledby="title desc">
  <title id="title">Vault as Control Plane for SPIFFE Identities</title>
  <desc id="desc">Architecture anchor visual showing Vault Enterprise as the control plane for Kubernetes-authenticated workload identity, zero-trust mTLS between microservices, cross-network JWT authorization, and the SPIRE overlay for Vault auth plus upstream authority.</desc>
  <defs>
    <style type="text/css"><![CDATA[
      @import url("https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap");
      @media (prefers-reduced-motion: reduce) {
        svg animate, svg animateMotion, svg animateTransform { display: none; }
      }
      .eyebrow { font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: 2px; font-weight: 700; fill: #6f6f6f; }
      .title { font-family: 'IBM Plex Sans', sans-serif; font-size: 30px; font-weight: 600; fill: #161616; }
      .panel-label { font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 1.4px; font-weight: 700; fill: #525252; }
      .panel-copy { font-family: 'IBM Plex Sans', sans-serif; font-size: 12px; fill: #525252; }
      .node-eyebrow { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 1.4px; font-weight: 700; fill: #ffffff; opacity: 0.92; }
      .node-title { font-family: 'IBM Plex Sans', sans-serif; font-size: 18px; font-weight: 600; fill: #ffffff; }
      .node-body { font-family: 'IBM Plex Sans', sans-serif; font-size: 12px; fill: #ffffff; }
      .note-title { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 1.4px; font-weight: 700; fill: #525252; }
      .note-body { font-family: 'IBM Plex Sans', sans-serif; font-size: 12px; fill: #525252; }
      .chip-text { font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.4px; font-weight: 600; fill: #525252; }
      .edge-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.8px; fill: #6f6f6f; }
      .caption { font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 1.5px; fill: #6f6f6f; }
    ]]></style>
    <pattern id="dg-dots" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.6" fill="#161616" opacity="0.05"/>
    </pattern>
    <filter id="dg-shadow" x="-5%" y="-5%" width="110%" height="120%">
