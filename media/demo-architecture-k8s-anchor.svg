  <text x="958" y="242" class="panel-copy">Separate trust domain for Vault auth and upstream authority proof.</text>

  <g filter="url(#dg-shadow)">
    <rect x="144" y="198" width="664" height="184" rx="12" fill="#8A3FFC">
      <animate attributeName="opacity" values="0.9;1;0.9" dur="3.8s" repeatCount="indefinite"/>
    </rect>
  </g>
  <text x="476" y="230" text-anchor="middle" class="node-eyebrow">CONTROL PLANE</text>
  <text x="476" y="260" text-anchor="middle" class="node-title">hashibank-vault</text>
  <text x="476" y="286" text-anchor="middle" class="node-body">Kubernetes auth accepts projected service account JWTs.</text>
  <text x="476" y="304" text-anchor="middle" class="node-body">Vault issues X.509 identities, JWT-SVIDs, and short-lived database creds.</text>
  <text x="476" y="322" text-anchor="middle" class="node-body">The mounts below map one trusted workload proof to the right workload outcome.</text>

