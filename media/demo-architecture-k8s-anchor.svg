    </filter>
    <marker id="dg-arrow" viewBox="0 0 7 7" refX="6" refY="3.5" markerWidth="7" markerHeight="7" orient="auto">
      <polyline points="0,0 6,3.5 0,7" fill="none" stroke="#6f6f6f" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="24" y="24" width="1312" height="812" rx="20" fill="#fdfdfd"/>
  <rect x="24" y="24" width="1312" height="812" rx="20" fill="url(#dg-dots)"/>
  <rect x="24" y="24" width="1312" height="812" rx="20" fill="none" stroke="#e0e0e0"/>

  <text x="64" y="72" class="eyebrow">DEMO ARCHITECTURE</text>
  <text x="64" y="110" class="title">Vault as Control Plane for SPIFFE Identities</text>
  <line x1="64" y1="126" x2="194" y2="126" stroke="#da1e28" stroke-width="3"/>

  <rect x="944" y="44" width="342" height="138" rx="12" fill="#f4f4f4"/>
  <text x="968" y="70" class="note-title">READING</text>
  <text x="968" y="92" class="note-body">Default path: Vault Enterprise + kind</text>
  <text x="968" y="112" class="note-body">Sub-use case A1: exact SPIFFE IDs over mTLS</text>
  <text x="968" y="132" class="note-body">Sub-use case B1: JWT-SVID to relationship insights</text>
  <text x="968" y="152" class="note-body">SPIRE overlay: JWT auth + upstreamauthority</text>
  <text x="968" y="172" class="note-body">Dynamic Postgres creds prove the SPIRE path</text>

  <rect x="44" y="156" width="868" height="652" rx="24" fill="#f6f2ff" opacity="0.52"/>
  <rect x="44" y="156" width="868" height="652" rx="24" fill="none" stroke="#8A3FFC" stroke-width="2"/>
  <text x="72" y="190" class="panel-label">DEFAULT VAULT-NATIVE FLOWS - hashibank.demo</text>

